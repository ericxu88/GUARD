name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # manual trigger for the opt-in GPU job

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # CPU job: the full Phase-1 suite runs here. No CUDA required.
  cpu:
    name: lint + types + tests (CPU)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install (dev extras)
        # CPU-only torch wheels keep the job fast and GPU-free.
        run: uv pip install --system -e ".[dev]" --extra-index-url https://download.pytorch.org/whl/cpu

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy
        run: mypy guard

      - name: Pytest (non-GPU)
        # gpu-marked tests auto-skip without CUDA (see conftest.py).
        run: pytest -m "not gpu"

  # GPU job: full suite incl. overlap/memory tests. Opt-in; needs a self-hosted
  # CUDA runner (compute capability >= 8.0). Skipped unless that runner is online.
  gpu:
    name: full suite (GPU)
    runs-on: [self-hosted, gpu]
    if: ${{ github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install (dev extras)
        run: python -m pip install -e ".[dev]"

      - name: Pytest (full, incl. GPU)
        run: pytest
